# Specrity Project Configuration
# This file should be committed to the main repo.
# Team members get the config automatically after git pull.

# ─── Spec Storage ───
# Options: "submodule" | "local" | "external"
#
# submodule:  PRD stored in a git submodule (recommended for teams)
#             → spec_path points to submodule relative path
# local:      PRD stored in a subdirectory (simplest, default)
#             → spec_path points to relative path
# external:   PRD stored in a completely separate repo
#             → requires SPEC_REPO_PATH in .env
spec_mode: local
spec_path: specs/

# ─── Branch Protection ───
# Branches that workflows must NEVER push to.
# Prevents accidental pushes to CI/CD environment branches.
protected_branches:
  - main
  - master
  - develop
  - integration
  - staging
  - production
  - release/*

# ─── Jira Workflow Transitions (Optional) ───
# Define state transitions for Jira tickets during workflow execution.
# Format is always "Source Status -> Target Status".
# AI will only transition the ticket if its current status matches the Source Status.
# Uncomment and modify to match your project's Jira boards.
jira_transitions:
  specify_start: "To Do -> Specifying"
  specify_done: "Specifying -> Spec Review"
  plan_start: "Spec Review -> Planning"
  plan_done: "Planning -> Ready for Dev"
  tasks_done: "To Do -> Task Review"
  implement_start: "To Do -> In Progress"
  implement_done: "In Progress -> Code Review"

# ─── Jira Settings ───
# Cloud ID and Project Key can be auto-detected via MCP or parsed from ticket ID.
# Uncomment to explicitly set:
# jira_cloud_id: your-cloud-id
# jira_project_key: PROJ
